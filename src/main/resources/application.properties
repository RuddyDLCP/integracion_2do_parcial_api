spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

server.port=${PORT:8080}

# Integración Contabilidad (vacío = solo vista previa / simulación)
integracion.contabilidad.url=${CONTABILIDAD_URL:}
integracion.contabilidad.auxiliar-id=9
integracion.contabilidad.cuenta-debito-default=${CONTABILIDAD_CUENTA_DEBITO_DEFAULT:1}
integracion.contabilidad.cuenta-credito-default=${CONTABILIDAD_CUENTA_CREDITO_DEFAULT:2}
integracion.contabilidad.descripcion-plantilla=Asiento de Cheques correspondiente al periodo %04d-%02d
integracion.contabilidad.connect-timeout-seconds=10
integracion.contabilidad.read-timeout-seconds=30
integracion.contabilidad.api-key-header=${CONTABILIDAD_API_KEY_HEADER:}
integracion.contabilidad.api-key=${CONTABILIDAD_API_KEY:}